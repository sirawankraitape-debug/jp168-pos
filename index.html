<script type="text/babel">
/* ============================================================
   JP168 POS — Unit price management (DB2: ราคาต่อหน่วย)
   ============================================================ */
(function () {
  const { useState, useMemo } = React;
  const Icon = window.Icon, fmt = window.JPFMT;
  const { ProductThumb, ImportExport } = window;

  function EditCell({ value, onCommit, prefix }) {
    const [v, setV] = useState(String(value));
    const [editing, setEditing] = useState(false);
    React.useEffect(()=>{ if(!editing) setV(String(value)); }, [value, editing]);
    function commit(){ setEditing(false); const n=Number(v); if(!isNaN(n)&&n!==value) onCommit(n); else setV(String(value)); }
    return (
      <div className={'price-cell'+(editing?' editing':'')} onClick={()=>setEditing(true)}>
        {prefix && <span className="pc-prefix">{prefix}</span>}
        <input className="num" value={v} type="number" min="0"
          onFocus={()=>setEditing(true)} onChange={e=>setV(e.target.value)} onBlur={commit}
          onKeyDown={e=>{ if(e.key==='Enter') e.target.blur(); if(e.key==='Escape'){ setV(String(value)); e.target.blur(); } }}/>
      </div>
    );
  }

  function Prices() {
    const DB = window.JPDB;
    const catalog = DB.getCatalog();
    const [q, setQ] = useState('');

    const [bulk, setBulk] = useState(false);

    const totalValue = catalog.reduce((s,p)=>s+p.price*p.stock,0);
    const avgMargin = catalog.length ? Math.round(catalog.reduce((s,p)=>s+(p.price?((p.price-p.cost)/p.price*100):0),0)/catalog.length) : 0;

    function applyBulk(pct){
      const prices = DB.getPrices();
      Object.keys(prices).forEach(id=>{ prices[id].price = Math.round(prices[id].price*(1+pct/100)); });
      DB.setPrices(prices); window.jpToast(`ปรับราคาทั้งหมด ${pct>0?'+':''}${pct}% เรียบร้อย`,'tag'); setBulk(false);

        </div>

        <div className="grid g-3" style={{marginBottom:16}}>
          <div className="card card-pad"><div className="stat-label">มูลค่าสต๊อกรวม (ราคาขาย)</div><div className="stat-val num" style={{fontSize:24}}>{fmt.baht(totalValue)}</div></div>
          <div className="card card-pad"><div className="stat-label">กำไรเฉลี่ย</div><div className="stat-val num" style={{fontSize:24,color:'var(--green)'}}>{avgMargin}%</div></div>
          <div className="card card-pad"><div className="stat-label">จำนวนรายการราคา</div><div className="stat-val num" style={{fontSize:24}}>{catalog.length}</div></div>
        </div>

              <div className="row gap-8 wrap">

                    <td className="r"><EditCell value={p.stock} onCommit={v=>DB.setPrice(p.id,{stock:v})}/></td>
                    <td className="r num hide-mobile" style={{fontWeight:700}}>{fmt.baht(p.price*p.stock)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        </div>
        <div className="muted" style={{fontSize:12.5, marginTop:10, textAlign:'center'}}>แตะที่ช่องราคาหรือสต๊อกเพื่อแก้ไข แล้วกด Enter เพื่อบันทึก</div>

        {io && <ImportExport mode={io} target="ราคา" onClose={()=>setIo(null)}/>}

  window.Prices = Prices;
})();

<script type="text/babel">
/* ============================================================
   JP168 POS — Sell / create bill (หน้าขาย)
   ============================================================ */
(function () {
  const { useState, useMemo } = React;
  const Icon = window.Icon, fmt = window.JPFMT;
  const { ProductThumb, Seg, ReceiptModal, StockBadge } = window;

  const CATS = ['ทั้งหมด','เสื้อคอกลม (แขนสั้น)','เสื้อคอกลม (แขนยาว)','เสื้อคอวี','เสื้อเด็ก'];
  const SIZE_ORDER = ['3XS','2XS','XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL','Free','-'];

  function POS({ receiptVariant }) {
    const DB = window.JPDB;
    const catalog = DB.getCatalog();
    const [q, setQ] = useState('');
    const [cat, setCat] = useState('ทั้งหมด');
    const [sizeFilt, setSizeFilt] = useState('ทั้งหมด');
    const [colorFilt, setColorFilt] = useState('ทั้งหมด');
    const [view, setView] = useState('grid');
    const [cart, setCart] = useState([]);            // {id, qty}
    const [customer, setCustomer] = useState('');
    const [discount, setDiscount] = useState(0);
    const [payment, setPayment] = useState('เงินสด');
    const [cash, setCash] = useState('');
    const [done, setDone] = useState(null);
    const [mobileCart, setMobileCart] = useState(false);
    const todayStr = () => new Date().toISOString().slice(0,10);
    const nowTimeStr = () => new Date().toTimeString().slice(0,5);
    const [billDate, setBillDate] = useState(todayStr);
    const [billTime, setBillTime] = useState(nowTimeStr);

    const sizes = useMemo(() => {
      const s = [...new Set(catalog.map(p=>p.size).filter(Boolean))];
      return s.sort((a,b) => { const ai=SIZE_ORDER.indexOf(a), bi=SIZE_ORDER.indexOf(b); return (ai<0?99:ai)-(bi<0?99:bi); });
    }, [catalog]);
    const colors = useMemo(() => [...new Set(catalog.map(p=>p.color).filter(c=>c&&c!=='-'))].sort(), [catalog]);

    const filtered = useMemo(() => catalog.filter(p => {
      const okCat   = cat==='ทั้งหมด' || p.category===cat;
      const okSize  = sizeFilt==='ทั้งหมด' || p.size===sizeFilt;
      const okColor = colorFilt==='ทั้งหมด' || p.color===colorFilt;
      const okQ     = !q || (p.name+p.code+p.color+p.size).toLowerCase().includes(q.toLowerCase());
      return okCat && okSize && okColor && okQ;
    }), [catalog, cat, sizeFilt, colorFilt, q]);

    const cartLines = cart.map(c => ({ ...catalog.find(p=>p.id===c.id), qty:c.qty })).filter(x=>x.id);
    const subtotal = cartLines.reduce((s,l)=>s+l.qty*l.price,0);
    const total = Math.max(0, subtotal - (Number(discount)||0));
    const count = cartLines.reduce((s,l)=>s+l.qty,0);

    function add(p){
      setCart(c => { const i=c.findIndex(x=>x.id===p.id); if(i>=0){ const n=[...c]; n[i]={...n[i],qty:n[i].qty+1}; return n; } return [...c,{id:p.id,qty:1}]; });
    }
    function setQty(id, qty){ setCart(c => qty<=0 ? c.filter(x=>x.id!==id) : c.map(x=>x.id===id?{...x,qty}:x)); }
    function clearCart(){ setCart([]); setDiscount(0); setCustomer(''); setCash(''); setBillDate(todayStr()); setBillTime(nowTimeStr()); }

    const todaySales = useMemo(() => {
      const t0 = new Date(billDate + 'T00:00:00'); t0.setHours(0,0,0,0);
      const t1 = t0.getTime() + 86400000;
      const recs = DB.getReceipts().filter(r => { const t=new Date(r.date).getTime(); return t>=t0.getTime()&&t<t1; });
      return recs.reduce((s,r) => {
        const p = r.payment||'เงินสด';
        s[p] = (s[p]||0) + r.total;
        return s;
      }, {});
    }, [DB.getReceipts(), billDate]);

    function checkout(){
      if (!cartLines.length) return;
      const billIso = new Date(billDate + 'T' + billTime + ':00').toISOString();
      const r = {
        id:'r'+Date.now(), no: DB.nextNo(), date: billIso,
        items: cartLines.map(l=>({ productId:l.id, code:l.code, name:l.name, size:l.size, qty:l.qty, price:l.price })),
        subtotal, discount:Number(discount)||0, vat:0, total, payment,
        customer: customer.trim()||'ลูกค้าทั่วไป',
        cash: payment==='เงินสด' ? (Number(cash)||total) : total,
      };
      DB.addReceipt(r);
      setDone(r); setMobileCart(false); clearCart();
    }

    const CartPanel = ({ embedded }) => (
      <div className={embedded?'pos-cart':'pos-cart pos-cart-mobile'}>
        <div className="pos-cart-head">
          <Icon name="pos" size={19}/>
          <b>รายการขาย</b>
          {count>0 && <span className="chip chip-gold num" style={{marginLeft:6}}>{count} ชิ้น</span>}
          <div style={{flex:1}}></div>
          {cartLines.length>0 && <button className="btn btn-sm btn-danger" onClick={clearCart}><Icon name="trash" size={14}/></button>}
          {!embedded && <button className="modal-x" style={{marginLeft:6}} onClick={()=>setMobileCart(false)}><Icon name="x" size={18}/></button>}
        </div>

        <div className="pos-cart-items">
          {cartLines.length===0 && (
            <div className="empty" style={{padding:'40px 16px'}}>
              <Icon name="pos" size={42}/>
              <div style={{fontWeight:600, color:'var(--tx-2)'}}>ยังไม่มีสินค้า</div>
              <div style={{fontSize:13}}>แตะสินค้าทางซ้ายเพื่อเพิ่มลงบิล</div>
            </div>
          )}
          {cartLines.map(l => (
            <div key={l.id} className="pos-line">
              <ProductThumb product={l} size={42}/>
              <div style={{flex:1, minWidth:0}}>
                <div className="pos-line-name">{l.name}</div>
                <div style={{fontSize:11.5, color:'var(--tx-3)'}}>{l.code} · {l.size} · {fmt.baht(l.price)}</div>
              </div>
              <div className="qty-step">
                <button onClick={()=>setQty(l.id,l.qty-1)}><Icon name="minus" size={15}/></button>
                <span className="num">{l.qty}</span>
                <button onClick={()=>setQty(l.id,l.qty+1)}><Icon name="plus" size={15}/></button>
              </div>
              <div className="num" style={{width:64, textAlign:'right', fontWeight:700, fontSize:13.5}}>{fmt.baht(l.qty*l.price)}</div>
            </div>
          ))}
        </div>

        <div className="pos-cart-foot">
          <div className="row gap-8" style={{marginBottom:10}}>
            <div style={{position:'relative', flex:1}}>
              <Icon name="user" size={16} style={{position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', color:'var(--tx-3)'}}/>
              <input className="field" style={{paddingLeft:34, padding:'9px 11px 9px 34px'}} placeholder="ชื่อลูกค้า (ไม่บังคับ)" value={customer} onChange={e=>setCustomer(e.target.value)}/>
            </div>
          </div>
          <div className="row gap-8" style={{marginBottom:6}}>
            <Seg value={payment} size="sm" onChange={setPayment}
              options={[{value:'เงินสด',label:'เงินสด',icon:'cash'},{value:'โอน',label:'โอน',icon:'transfer'},{value:'บัตร',label:'บัตร',icon:'card'}]}/>
          </div>
          <div style={{marginBottom:10, padding:'8px 10px', background:'var(--surface-2)', borderRadius:10, border:'1px solid var(--line)'}}>
            <div style={{fontSize:11, color:'var(--tx-3)', fontWeight:600, marginBottom:6}}>ยอดสะสมวันนี้</div>
            <div className="row gap-6" style={{flexWrap:'wrap'}}>
              {[['เงินสด','var(--green)'],['โอน','var(--blue)'],['บัตร','#6A55A8']].map(([label,color])=>{
                const done = todaySales[label]||0;
                const inCart = (total>0 && payment===label) ? total : 0;
                const grand = done + inCart;
                const active = grand > 0;
                return (
                  <div key={label} style={{flex:1, minWidth:70, textAlign:'center', padding:'4px 6px',
                    borderRadius:8, background: inCart>0?'var(--gold-wash)':'var(--surface)',
                    border:'1.5px solid', borderColor: active?color:'var(--line)',
                    transition:'all .2s'}}>
                    <div style={{fontSize:10.5, fontWeight:600, color: active?color:'var(--tx-3)'}}>{label}</div>
                    <div className="num" style={{fontSize:13, fontWeight:700, color: active?color:'var(--tx-3)'}}>
                      {active ? fmt.baht(grand) : '฿0'}
                    </div>
                    {inCart>0 && <div style={{fontSize:9.5, color:'var(--gold-deep)', marginTop:1}}>+{fmt.baht(inCart)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
          <div className="row gap-8" style={{marginBottom:10, alignItems:'center'}}>
            <Icon name="calendar" size={16} style={{color:'var(--tx-3)', flexShrink:0}}/>
            <input type="date" className="field num" style={{flex:1, padding:'7px 10px', fontSize:13.5}}
              value={billDate} max={todayStr()} onChange={e=>setBillDate(e.target.value)}/>
            <input type="time" className="field num" style={{width:90, padding:'7px 8px', fontSize:13.5}}
              value={billTime} onChange={e=>setBillTime(e.target.value)}/>
          </div>
          {billDate !== todayStr() && (
            <div style={{fontSize:12, color:'var(--gold-deep)', fontWeight:600, marginBottom:8, textAlign:'center'}}>
              <Icon name="clock" size={13}/> บันทึกย้อนหลัง: {new Date(billDate).toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}
            </div>
          )}
          <div className="pos-sum-row"><span>ยอดรวม</span><b className="num">{fmt.baht(subtotal)}</b></div>
          <div className="pos-sum-row">
            <span>ส่วนลด</span>
            <div className="row gap-8">
              <input className="field num" style={{width:90, padding:'6px 10px', textAlign:'right'}} type="number" min="0" placeholder="0" value={discount||''} onChange={e=>setDiscount(e.target.value)}/>
            </div>
          </div>
          {payment==='เงินสด' && (
            <div className="pos-sum-row">
              <span>รับเงินสด</span>
              <input className="field num" style={{width:110, padding:'6px 10px', textAlign:'right'}} type="number" min="0" placeholder={total} value={cash} onChange={e=>setCash(e.target.value)}/>
            </div>
          )}
          {payment==='เงินสด' && cash && Number(cash)>=total && (
            <div className="pos-sum-row" style={{color:'var(--green)'}}><span>เงินทอน</span><b className="num">{fmt.baht(Number(cash)-total)}</b></div>
          )}
          <div className="pos-total"><span>ยอดสุทธิ</span><b className="num">{fmt.baht(total)}</b></div>
          <button className="btn btn-gold btn-block" style={{padding:'14px', fontSize:15.5, marginTop:6}} disabled={!cartLines.length} onClick={checkout}>
            <Icon name="check" size={19}/> ชำระเงิน & ออกบิล
          </button>
        </div>
      </div>
    );

    return (
      <div className="pos-wrap">
        {/* Products */}
        <div className="pos-products">
          <div className="pos-toolbar">
            <div className="tb-search" style={{flex:1, display:'flex'}}>
              <Icon name="search" size={18}/>
              <input placeholder="ค้นหาสินค้า / รหัส / ไซส์…" value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
            {sizes.length>0 && (
              <select value={sizeFilt} onChange={e=>setSizeFilt(e.target.value)}
                style={{padding:'7px 10px',borderRadius:10,border:'1.5px solid',borderColor:sizeFilt!=='ทั้งหมด'?'var(--gold)':'var(--line)',
                  background:sizeFilt!=='ทั้งหมด'?'var(--gold-wash)':'var(--surface)',
                  color:'var(--tx)',fontWeight:600,fontSize:13,cursor:'pointer',minWidth:90}}>
                <option value="ทั้งหมด">ไซส์ ทั้งหมด</option>
                {sizes.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            )}
            {colors.length>0 && (
              <select value={colorFilt} onChange={e=>setColorFilt(e.target.value)}
                style={{padding:'7px 10px',borderRadius:10,border:'1.5px solid',borderColor:colorFilt!=='ทั้งหมด'?'var(--gold)':'var(--line)',
                  background:colorFilt!=='ทั้งหมด'?'var(--gold-wash)':'var(--surface)',
                  color:'var(--tx)',fontWeight:600,fontSize:13,cursor:'pointer',minWidth:100}}>
                <option value="ทั้งหมด">สี ทั้งหมด</option>
                {colors.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            )}
            <div className="hide-mobile"><Seg value={view} size="sm" onChange={setView} options={[{value:'grid',icon:'grid',label:''},{value:'list',icon:'list',label:''}]}/></div>
          </div>
          <div className="pos-cats">
            {CATS.map(c => (
              <button key={c} className={'cat-pill'+(cat===c?' active':'')} onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>

          {view==='grid' ? (
            <div className="pos-grid">
              {filtered.map(p => (
                <button key={p.id} className="prod-card" onClick={()=>add(p)} disabled={p.stock<=0}>
                  <div className="prod-card-top">
                    <ProductThumb product={p} size={52} radius={13}/>
                    {p.stock<25 && <span className={'dot-stk '+(p.stock<=0?'red':'gold')}>{p.stock<=0?'หมด':p.stock}</span>}
                  </div>
                  <div className="prod-name">{p.name}</div>
                  <div className="prod-code" style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{background:'var(--bg)',border:'1px solid var(--line)',borderRadius:6,padding:'1px 6px',fontSize:11,fontWeight:700,color:'var(--tx-2)'}}>{p.size}</span>
                    <span style={{color:'var(--tx-3)'}}>{p.color}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--tx-3)',opacity:.75}}>{p.code}</div>
                  <div className="prod-foot">
                    <span className="prod-price num">{fmt.baht(p.price)}</span>
                    <span className="prod-add"><Icon name="plus" size={16}/></span>
                  </div>
                </button>
              ))}
              {filtered.length===0 && <div className="empty" style={{gridColumn:'1/-1'}}><Icon name="search" size={42}/><div>ไม่พบสินค้า</div></div>}
            </div>
          ) : (
            <div className="card" style={{overflow:'hidden'}}>
              <table className="tbl">
                <thead><tr><th>สินค้า</th><th className="hide-mobile">หมวด</th><th className="c">ไซส์</th><th className="r">ราคา</th><th className="r">สต๊อก</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(p => (
                    <tr key={p.id}>
                      <td><div className="row gap-12"><ProductThumb product={p} size={38}/><div><div style={{fontWeight:600,fontSize:13.5}}>{p.name}</div><div style={{fontSize:11.5,color:'var(--tx-3)'}}>{p.code}</div></div></div></td>
                      <td className="hide-mobile"><span className="tag">{p.category}</span></td>
                      <td className="c"><span className="tag">{p.size}</span></td>
                      <td className="r num" style={{fontWeight:700}}>{fmt.baht(p.price)}</td>
                      <td className="r"><StockBadge stock={p.stock}/></td>
                      <td className="r"><button className="btn btn-sm btn-soft" disabled={p.stock<=0} onClick={()=>add(p)}><Icon name="plus" size={15}/></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        {/* Cart (desktop) */}
        <div className="pos-cart-col hide-mobile">{CartPanel({embedded:true})}</div>

        {/* Mobile cart trigger */}
        {count>0 && !mobileCart && (
          <button className="pos-mobile-bar" onClick={()=>setMobileCart(true)}>
            <span className="pos-mobile-count num">{count}</span>
            <span>ดูบิล</span>
            <span className="num" style={{marginLeft:'auto', fontSize:16}}>{fmt.baht(total)}</span>
            <Icon name="chevR" size={18}/>
          </button>
        )}
        {mobileCart && <div className="pos-sheet-back" onClick={()=>setMobileCart(false)}><div onClick={e=>e.stopPropagation()} style={{width:'100%'}}>{CartPanel({embedded:false})}</div></div>}

        {done && <ReceiptModal receipt={done} success variant={receiptVariant} onClose={()=>setDone(null)}/>}
      </div>
    );
  }

  window.POS = POS;
})();
</script>
<script type="text/babel">
/* ============================================================
   JP168 POS — Product catalog management (DB1: รายการสินค้า)
   ============================================================ */
(function () {
  const { useState, useMemo } = React;
  const Icon = window.Icon, fmt = window.JPFMT;
  const { Modal, ProductThumb, Confirm, StockBadge, ImportExport } = window;

  const CATS = ['เสื้อคอกลม (แขนสั้น)','เสื้อคอกลม (แขนยาว)','เสื้อคอวี','เสื้อเด็ก'];
  const SIZES = ['S','M','L','XL','2XL','3XL','4XL','5XL','Free'];
  const UNITS = ['ตัว','ชุด','แพ็ค','ใบ','ผืน','คู่','ชิ้น'];

  function ProductForm({ initial, onClose }) {
    const DB = window.JPDB;
    const editing = !!initial;
    const [f, setF] = useState(initial || { code:'', name:'', category:'เสื้อยืด', size:'M', color:'', unit:'ตัว', price:'', cost:'', stock:'' });
    const set = (k,v)=>setF(s=>({...s,[k]:v}));
    function save(){
      if(!f.name.trim()||!f.code.trim()){ window.jpToast('กรุณากรอกรหัสและชื่อสินค้า','alert'); return; }
      DB.upsertProduct({
        id: f.id || ('p'+Date.now()), code:f.code.trim(), name:f.name.trim(), category:f.category,
        size:f.size, color:f.color.trim()||'-', unit:f.unit,
        price:Number(f.price)||0, cost:Number(f.cost)||0, stock:Number(f.stock)||0,
      });
      window.jpToast(editing?'แก้ไขสินค้าเรียบร้อย':'เพิ่มสินค้าใหม่เรียบร้อย','check');
      onClose();
    }
    const lbl = (t)=><label className="field-label">{t}</label>;
    return (
      <Modal title={editing?'แก้ไขสินค้า':'เพิ่มสินค้าใหม่'} icon="box" onClose={onClose} width={560}
        footer={<><button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button><button className="btn btn-gold" onClick={save}><Icon name="check" size={17}/> บันทึก</button></>}>
        <div className="grid g-2" style={{gridTemplateColumns:'1fr 1fr', gap:14}}>
          <div>{lbl('รหัสสินค้า')}<input className="field" placeholder="เช่น TS-001" value={f.code} onChange={e=>set('code',e.target.value)}/></div>
          <div>{lbl('หน่วยนับ')}<select className="field" value={f.unit} onChange={e=>set('unit',e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
          <div style={{gridColumn:'1/-1'}}>{lbl('ชื่อสินค้า')}<input className="field" placeholder="ชื่อสินค้า" value={f.name} onChange={e=>set('name',e.target.value)}/></div>
          <div>{lbl('หมวดหมู่')}<select className="field" value={f.category} onChange={e=>set('category',e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div>{lbl('ไซส์')}<select className="field" value={f.size} onChange={e=>set('size',e.target.value)}>{SIZES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div>{lbl('สี')}<input className="field" placeholder="เช่น ดำ" value={f.color} onChange={e=>set('color',e.target.value)}/></div>
          <div>{lbl('จำนวนสต๊อก')}<input className="field num" type="number" min="0" placeholder="0" value={f.stock} onChange={e=>set('stock',e.target.value)}/></div>
        </div>
        <div style={{marginTop:16, padding:'14px', background:'var(--gold-wash)', borderRadius:12}}>
          <div className="row gap-8" style={{marginBottom:10, color:'var(--gold-deep)', fontWeight:700, fontSize:13}}><Icon name="tag" size={16}/> ราคา (ฐานข้อมูลราคาต่อหน่วย)</div>
          <div className="grid g-2" style={{gridTemplateColumns:'1fr 1fr', gap:14}}>
            <div>{lbl('ราคาขาย / หน่วย')}<input className="field num" type="number" min="0" placeholder="0" value={f.price} onChange={e=>set('price',e.target.value)}/></div>
            <div>{lbl('ราคาทุน (ไม่บังคับ)')}<input className="field num" type="number" min="0" placeholder="0" value={f.cost} onChange={e=>set('cost',e.target.value)}/></div>
          </div>
        </div>
      </Modal>
    );
  }

  function Products() {
    const DB = window.JPDB;
    const catalog = DB.getCatalog();
    const [q, setQ] = useState('');
    const [cat, setCat] = useState('ทั้งหมด');
    const [form, setForm] = useState(null);     // {} or product
    const [del, setDel] = useState(null);
    const [io, setIo] = useState(null);

    const rows = useMemo(()=>catalog.filter(p=>{
      const okCat = cat==='ทั้งหมด'||p.category===cat;
      const okQ = !q || (p.name+p.code+p.color).toLowerCase().includes(q.toLowerCase());
      return okCat&&okQ;
    }), [catalog,cat,q]);

    return (
      <div className="content-narrow">
        <div className="sec-head">
          <div className="row gap-12">
            <div style={{width:42,height:42,borderRadius:12,background:'var(--ink)',color:'var(--gold)',display:'grid',placeItems:'center'}}><Icon name="db" size={21}/></div>
            <div><h2>รายการสินค้า</h2><div className="sub">DB1 · ฐานข้อมูลสินค้า · {catalog.length} รายการ</div></div>
          </div>
          <div className="sec-spacer"></div>
          <button className="btn btn-ghost hide-mobile" onClick={()=>setIo('import')}><Icon name="upload" size={17}/> นำเข้า</button>
          <button className="btn btn-ghost hide-mobile" onClick={()=>setIo('export')}><Icon name="download" size={17}/> ส่งออก</button>
          <button className="btn btn-gold" onClick={()=>setForm({})}><Icon name="plus" size={18}/> เพิ่มสินค้า</button>
        </div>

        <div className="row gap-12 wrap" style={{marginBottom:16}}>
          <div className="tb-search" style={{flex:1, minWidth:200, background:'var(--surface)'}}>
            <Icon name="search" size={18}/><input placeholder="ค้นหาชื่อ / รหัส / สี…" value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <select className="field" style={{width:'auto'}} value={cat} onChange={e=>setCat(e.target.value)}>
            <option>ทั้งหมด</option>{CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>

        <div className="card" style={{overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>สินค้า</th><th className="hide-mobile">รหัส</th><th className="hide-mobile">หมวด</th>
              <th className="c">ไซส์</th><th className="hide-mobile">สี</th><th className="r">ราคา/หน่วย</th><th className="r hide-mobile">สต๊อก</th><th className="r">จัดการ</th>
            </tr></thead>
            <tbody>
              {rows.map(p=>(
                <tr key={p.id}>
                  <td><div className="row gap-12"><ProductThumb product={p} size={40}/><div><div style={{fontWeight:600,fontSize:13.5}}>{p.name}</div><div style={{fontSize:11.5,color:'var(--tx-3)'}} className="hide-mobile">{p.code} · {p.unit}</div></div></div></td>
                  <td className="hide-mobile"><span className="tag num">{p.code}</span></td>
                  <td className="hide-mobile"><span className="tag">{p.category}</span></td>
                  <td className="c"><span className="tag">{p.size}</span></td>
                  <td className="hide-mobile">{p.color}</td>
                  <td className="r num" style={{fontWeight:700,fontSize:14}}>{fmt.baht(p.price)}</td>
                  <td className="r hide-mobile"><StockBadge stock={p.stock}/></td>
                  <td className="r"><div className="row gap-8" style={{justifyContent:'flex-end'}}>
                    <button className="tb-icon-btn" style={{width:34,height:34}} onClick={()=>setForm(p)}><Icon name="edit" size={16}/></button>
                    <button className="tb-icon-btn" style={{width:34,height:34,color:'var(--red)'}} onClick={()=>setDel(p)}><Icon name="trash" size={16}/></button>
                  </div></td>
                </tr>
              ))}
              {rows.length===0 && <tr><td colSpan="8"><div className="empty"><Icon name="box" size={42}/><div>ไม่พบสินค้า</div></div></td></tr>}
            </tbody>
          </table>
          </div>
        </div>

        {form && <ProductForm initial={form.id?form:null} onClose={()=>setForm(null)}/>}
        {del && <Confirm danger title="ลบสินค้า" confirmText="ลบสินค้า"
          message={`ต้องการลบ "${del.name}" (${del.code}) ออกจากฐานข้อมูลใช่หรือไม่? การลบจะลบข้อมูลราคาด้วย`}
          onConfirm={()=>{DB.deleteProduct(del.id); window.jpToast('ลบสินค้าเรียบร้อย','trash');}} onClose={()=>setDel(null)}/>}
        {io && <ImportExport mode={io} target="สินค้า" onClose={()=>setIo(null)}/>}
      </div>
    );
  }

  window.Products = Products;
})();
</script>
<script type="text/babel">
/* ============================================================
   JP168 POS — App shell, navigation, routing, tweaks
   ============================================================ */
(function () {
  const { useState, useEffect, useReducer } = React;
  const Icon = window.Icon, fmt = window.JPFMT, SHOP = window.JPSHOP;
  const { ToastHost } = window;
  const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;

  const NAV = [
    { id:'dashboard', label:'แดชบอร์ด', icon:'dashboard', sub:'ภาพรวมยอดขายร้าน' },
    { id:'pos',       label:'หน้าขาย',  icon:'pos',       sub:'บันทึกการขาย & ออกบิล' },
    { id:'products',  label:'รายการสินค้า', icon:'box',   sub:'ฐานข้อมูลสินค้า (DB1)' },
    { id:'prices',    label:'ราคาต่อหน่วย', icon:'tag',   sub:'ฐานข้อมูลราคา (DB2)' },
    { id:'receipts',  label:'ประวัติบิล', icon:'receipt', sub:'ใบเสร็จย้อนหลัง' },
  ];

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "gold",
    "density": "regular",
    "receiptStyle": "classic",
    "showBrandWatermark": true
  }/*EDITMODE-END*/;

  /* ---- Loading / error screen while Supabase initialises ---- */
  function LoadingScreen({ error }) {
    return (
      <div style={{ display:'grid', placeItems:'center', height:'100vh',
        background:'#F6F4EF', fontFamily:"'IBM Plex Sans Thai',sans-serif" }}>
        <style>{`@keyframes jp-spin{to{transform:rotate(360deg)}}`}</style>
        {!error ? (
          <div style={{ textAlign:'center', padding:32 }}>
            <div style={{ width:52, height:52, borderRadius:'50%',
              border:'4px solid #E5A823', borderTopColor:'transparent',
              animation:'jp-spin .85s linear infinite', margin:'0 auto 20px' }}/>
            <div style={{ fontSize:17, fontWeight:700, color:'#1B1810' }}>กำลังเชื่อมต่อ…</div>
            <div style={{ fontSize:13, color:'#8B8472', marginTop:6 }}>JP168 POS · โหลดข้อมูลจาก Cloud</div>
          </div>
        ) : (
          <div style={{ textAlign:'center', padding:32, maxWidth:360 }}>
            <div style={{ fontSize:44, marginBottom:12 }}>⚠️</div>
            <div style={{ fontSize:17, fontWeight:700, color:'#1B1810', marginBottom:8 }}>เชื่อมต่อไม่ได้</div>
            <div style={{ fontSize:12.5, color:'#C0432F', background:'#FBEAE6',
              borderRadius:10, padding:'10px 14px', marginBottom:16, lineHeight:1.6 }}>{error}</div>
            <button onClick={() => location.reload()}
              style={{ background:'#E5A823', color:'#fff', border:'none', borderRadius:10,
                padding:'10px 24px', fontSize:14, fontWeight:700, cursor:'pointer' }}>
              ลองใหม่
            </button>
          </div>
        )}
      </div>
    );
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [page, setPage] = useState('dashboard');
    const [openReceipt, setOpenReceipt] = useState(null);
    const [, force] = useReducer(x=>x+1, 0);
    const [ready, setReady] = useState(false);
    const [dbError, setDbError] = useState(null);

    useEffect(() => {
      window.JPDB.ready
        .then(() => setReady(true))
        .catch(e => setDbError(e.message || 'เชื่อมต่อ Supabase ไม่ได้'));
      return window.JPDB.subscribe(force);
    }, []);

    if (!ready && !dbError) return <LoadingScreen/>;
    if (dbError) return <LoadingScreen error={dbError}/>;

    function go(p, opts){ setPage(p); if(opts&&opts.open) setOpenReceipt(opts.open); window.scrollTo&&window.scrollTo(0,0); }

    const cur = NAV.find(n=>n.id===page);
    const receiptCount = window.JPDB.getReceipts().length;

    let Screen = null;
    if (page==='dashboard') Screen = <window.Dashboard go={go}/>;
    else if (page==='pos') Screen = <window.POS receiptVariant={t.receiptStyle==='bold'?'bold':'classic'}/>;
    else if (page==='products') Screen = <window.Products/>;
    else if (page==='prices') Screen = <window.Prices/>;
    else if (page==='receipts') Screen = <window.Receipts openId={openReceipt} clearOpen={()=>setOpenReceipt(null)} receiptVariant={t.receiptStyle==='bold'?'bold':'classic'}/>;

    const today = new Date().toLocaleDateString('th-TH',{weekday:'long', day:'numeric', month:'long', year:'numeric'});

    return (
      <div className="app" data-theme={t.theme} data-density={t.density}>
        {/* Sidebar */}
        <aside className="sidebar">
          <div className="sb-brand">
            <img src="assets/jp-logo-cropped.png" className="sb-logo" alt="JP168"/>
            <div className="sb-brand-tx"><b>JP 75 T-SHIRT</b><span>POS · บันทึกยอดขาย</span></div>
          </div>
          <div className="sb-section">เมนูหลัก</div>
          {NAV.map(n=>(
            <button key={n.id} className={'nav-item'+(page===n.id?' active':'')} onClick={()=>go(n.id)}>
              <Icon name={n.icon} size={20}/>{n.label}
              {n.id==='receipts' && <span className="nav-badge num">{receiptCount}</span>}
            </button>
          ))}
          <div className="sb-foot">
            <button className="nav-item" onClick={()=>{
              if(confirm('เรียงเลขบิลใหม่ตั้งแต่ JP--0001?\nบิลเก่าสุด = JP--0001 รันต่อตามวันที่/เวลา')){
                window.JPDB.renumberReceipts()
                  .then(n => alert('เรียงเลขบิลใหม่เสร็จแล้ว ' + n + ' บิล'))
                  .catch(e => alert('เกิดข้อผิดพลาด: ' + e.message));
              }
            }}>
              <Icon name="receipt" size={20}/>เรียงเลขบิลใหม่
            </button>
            <button className="nav-item" style={{color:'var(--tx-3)',fontSize:12}} onClick={()=>{
              const ans = prompt('⚠️ อันตราย! จะลบข้อมูลทั้งหมด (สินค้า + บิล) ถาวร\n\nพิมพ์  รีเซ็ต  เพื่อยืนยัน:');
              if(ans === 'รีเซ็ต'){ window.JPDB.resetAll(); }
              else if(ans !== null){ alert('ยกเลิก — พิมพ์ไม่ตรง'); }
            }}>
              <Icon name="settings" size={18}/>รีเซ็ตข้อมูล
            </button>
            <div className="sb-user">
              <div className="sb-ava">JP</div>
              <div className="sb-user-tx"><b>เจ้าของร้าน</b><span>{SHOP.tel}</span></div>
            </div>
          </div>
        </aside>

        {/* Main */}
        <div className="main">
          <header className="topbar">
            <div>
              <h1>{cur.label}</h1>
              <div className="sub">{cur.sub}</div>
            </div>
            <div className="tb-spacer"></div>
            <div className="tb-search hide-md" style={{minWidth:180}}>
              <Icon name="calendar" size={17}/>
              <span style={{fontSize:13.5, color:'var(--tx-2)', whiteSpace:'nowrap'}}>{today}</span>
            </div>
            {page!=='pos' && <button className="btn btn-gold hide-mobile" onClick={()=>go('pos')}><Icon name="plus" size={18}/> ขายด่วน</button>}
            <button className="tb-icon-btn"><Icon name="bell" size={19}/><span className="tb-dot"></span></button>
          </header>

          <main className="content">{Screen}</main>
        </div>

        {/* Mobile bottom nav */}
        <nav className="botnav">
          <button className={'botnav-item'+(page==='dashboard'?' active':'')} onClick={()=>go('dashboard')}><Icon name="dashboard" size={22}/>หน้าหลัก</button>
          <button className={'botnav-item'+(page==='products'?' active':'')} onClick={()=>go('products')}><Icon name="box" size={22}/>สินค้า</button>
          <button className="botnav-item botnav-fab" onClick={()=>go('pos')}><span className="fab"><Icon name="pos" size={24}/></span>ขาย</button>
          <button className={'botnav-item'+(page==='prices'?' active':'')} onClick={()=>go('prices')}><Icon name="tag" size={22}/>ราคา</button>
          <button className={'botnav-item'+(page==='receipts'?' active':'')} onClick={()=>go('receipts')}><Icon name="receipt" size={22}/>บิล</button>
        </nav>

        <ToastHost/>

        {/* Tweaks */}
        <TweaksPanel title="Tweaks">
          <TweakSection label="ธีมสี" />
          <TweakRadio label="โทนสี" value={t.theme}
            options={[{value:'gold',label:'ทอง'},{value:'midnight',label:'ดำกรม'},{value:'mono',label:'ขาวดำ'}]}
            onChange={v=>setTweak('theme',v)}/>
          <TweakSection label="เลย์เอาต์" />
          <TweakRadio label="ความหนาแน่น" value={t.density}
            options={[{value:'compact',label:'แน่น'},{value:'regular',label:'ปกติ'},{value:'comfy',label:'โปร่ง'}]}
            onChange={v=>setTweak('density',v)}/>
          <TweakSection label="ใบเสร็จ" />
          <TweakRadio label="สไตล์บิล" value={t.receiptStyle}
            options={[{value:'classic',label:'คลาสสิก'},{value:'bold',label:'เข้ม'}]}
            onChange={v=>setTweak('receiptStyle',v)}/>
        </TweaksPanel>
      </div>
    );
  }

  window.JPApp = App;
})();
</script>
<script type="text/babel" data-presets="react">
  const App=window.JPApp; const root=ReactDOM.createRoot(document.getElementById('root')); root.render(<App/>);
</script></body></html>
