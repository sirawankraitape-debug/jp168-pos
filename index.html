<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>JP168 POS — บันทึกยอดขาย &amp; ออกบิล</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   JP168 POS — Design tokens & base styles
   Brand DNA: warm ink black + premium gold (from JP logo)
   ============================================================ */

:root {
  /* Brand */
  --gold:        #E5A823;
  --gold-deep:   #C28A12;
  --gold-soft:   #F4D77E;
  --gold-wash:   #FBF1D6;
  --ink:         #15120B;   /* warm near-black */
  --ink-2:       #221E14;
  --ink-3:       #322C1F;

  /* Surfaces (warm neutrals) */
  --bg:          #F6F4EF;
  --surface:     #FFFFFF;
  --surface-2:   #FBFAF6;
  --line:        #E8E3D8;
  --line-strong: #D8D1C2;

  /* Text */
  --tx:          #1B1810;
  --tx-2:        #5C5547;
  --tx-3:        #8B8472;
  --on-ink:      #F4EFE2;
  --on-ink-2:    #B7AE97;

  /* Status */
  --green:   #2E8B57;
  --green-bg:#E6F2EA;
  --red:     #C0432F;
  --red-bg:  #FBEAE6;
  --blue:    #2F6DB5;
  --blue-bg: #E8F0F9;

  /* Geometry */
  --r-xs: 6px;
  --r-sm: 9px;
  --r-md: 13px;
  --r-lg: 18px;
  --r-xl: 24px;
  --sb-w: 248px;

  /* Shadows (warm-tinted) */
  --sh-sm: 0 1px 2px rgba(40,33,15,.06), 0 1px 1px rgba(40,33,15,.04);
  --sh-md: 0 4px 14px rgba(40,33,15,.08), 0 1px 3px rgba(40,33,15,.05);
  --sh-lg: 0 18px 50px rgba(33,28,14,.18), 0 4px 14px rgba(33,28,14,.10);
  --sh-gold: 0 8px 22px rgba(197,138,18,.30);

  --ff: 'IBM Plex Sans Thai', 'Noto Sans Thai', system-ui, sans-serif;
  --density-pad: 16px;
}

/* ---- Theme variants (set on .app via data-theme) ---- */
.app[data-theme="midnight"] {
  --ink: #0F1722; --ink-2: #18222F; --ink-3: #24303F;
  --gold: #E5A823; --on-ink: #EAF0F7; --on-ink-2: #9FB0C4;
}
.app[data-theme="mono"] {
  --gold: #1B1810; --gold-deep: #000; --gold-soft: #DAD4C7; --gold-wash:#F0EDE4;
  --ink: #1B1810; --ink-2:#262219; --ink-3:#352F23;
}

.app[data-density="compact"] { --density-pad: 11px; }
.app[data-density="comfy"]   { --density-pad: 22px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--ff);
  background: var(--ink);
  color: var(--tx);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button, input, select, textarea { font-family: inherit; }
::selection { background: var(--gold-soft); color: var(--ink); }

/* number alignment everywhere */
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

/* ============================================================
   App shell
   ============================================================ */
.app {
  height: 100vh; height: 100dvh;
  display: flex;
  background: var(--bg);
  overflow: hidden;
}

/* Sidebar (tablet / desktop) */
.sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  background: var(--ink);
  color: var(--on-ink);
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
  gap: 6px;
  position: relative;
  z-index: 20;
}
.sb-brand {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 8px 16px;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sb-logo {
  width: 42px; height: 42px; border-radius: 50%;
  background: #fff; object-fit: cover; flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(229,168,35,.55), 0 4px 12px rgba(0,0,0,.4);
}
.sb-brand-tx b { display:block; font-size: 15px; letter-spacing:.3px; color: #fff; line-height:1.1; }
.sb-brand-tx span { display:block; font-size: 10.5px; letter-spacing:1.4px; color: var(--gold); font-weight:600; margin-top:3px; }

.sb-section { font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--on-ink-2); padding: 14px 12px 6px; font-weight: 600; opacity:.8; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: var(--r-sm);
  color: var(--on-ink-2); font-size: 14.5px; font-weight: 500;
  cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  transition: background .15s, color .15s;
  position: relative;
}
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,.05); color: var(--on-ink); }
.nav-item.active { background: linear-gradient(100deg, rgba(229,168,35,.18), rgba(229,168,35,.06));
  color: #fff; }
.nav-item.active::before {
  content:''; position:absolute; left:-14px; top:50%; transform: translateY(-50%);
  width: 4px; height: 22px; border-radius: 0 4px 4px 0; background: var(--gold);
}
.nav-item.active svg { color: var(--gold); }
.nav-badge { margin-left:auto; background: var(--gold); color: var(--ink);
  font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }

.sb-foot { margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.08); }
.sb-user { display:flex; align-items:center; gap:10px; padding: 8px 10px; border-radius: var(--r-sm); }
.sb-ava { width:34px; height:34px; border-radius:50%; background: linear-gradient(135deg,var(--gold),var(--gold-deep));
  color: var(--ink); display:grid; place-items:center; font-weight:700; font-size:14px; flex-shrink:0;}
.sb-user-tx b { font-size:13px; color:#fff; display:block; }
.sb-user-tx span { font-size:11px; color: var(--on-ink-2); }

/* Main column */
.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Topbar */
.topbar {
  height: 64px; flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 14px;
  padding: 0 22px;
}
.topbar h1 { font-size: 19px; font-weight: 700; margin: 0; letter-spacing:-.2px; }
.topbar .sub { font-size: 12.5px; color: var(--tx-3); margin-top:1px; }
.tb-spacer { flex: 1; }
.tb-search {
  display:flex; align-items:center; gap:9px;
  background: var(--surface-2); border: 1px solid var(--line);
  padding: 8px 13px; border-radius: var(--r-md); min-width: 220px;
  color: var(--tx-3);
}
.tb-search input { border:none; background:none; outline:none; font-size:14px; color: var(--tx); width: 100%; }
.tb-icon-btn { width:40px; height:40px; border-radius: var(--r-md); border:1px solid var(--line);
  background: var(--surface); display:grid; place-items:center; cursor:pointer; color: var(--tx-2);
  position: relative; transition: background .15s, border-color .15s;}
.tb-icon-btn:hover { background: var(--surface-2); border-color: var(--line-strong); }
.tb-dot { position:absolute; top:8px; right:9px; width:7px; height:7px; border-radius:50%;
  background: var(--red); border:1.5px solid var(--surface); }

/* Content scroll area */
.content { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
.content-narrow { max-width: 1180px; margin: 0 auto; }

/* Mobile bottom nav (hidden on wide) */
.botnav { display: none; }

/* ============================================================
   Generic UI
   ============================================================ */
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--sh-sm); }
.card-pad { padding: var(--density-pad); }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; cursor:pointer; font-weight:600; font-size:14px;
  padding: 10px 16px; border-radius: var(--r-md); transition: filter .15s, transform .05s, background .15s, box-shadow .15s;
  white-space: nowrap; }
.btn:active { transform: translateY(1px); }
.btn svg { width:18px; height:18px; }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: var(--ink);
  box-shadow: var(--sh-gold); }
.btn-gold:hover { filter: brightness(1.05); }
.btn-ink { background: var(--ink); color: var(--on-ink); }
.btn-ink:hover { background: var(--ink-2); }
.btn-ghost { background: var(--surface); color: var(--tx); border: 1px solid var(--line-strong); }
.btn-ghost:hover { background: var(--surface-2); }
.btn-soft { background: var(--gold-wash); color: var(--gold-deep); }
.btn-soft:hover { filter: brightness(.98); }
.btn-danger { background: var(--red-bg); color: var(--red); }
.btn-sm { padding: 7px 12px; font-size: 13px; border-radius: var(--r-sm); }
.btn-icon { padding: 9px; }
.btn-block { width: 100%; }
.btn:disabled { opacity:.5; cursor: not-allowed; }

.chip { display:inline-flex; align-items:center; gap:6px; padding: 4px 11px; border-radius: 30px;
  font-size: 12.5px; font-weight: 600; }
.chip-gold { background: var(--gold-wash); color: var(--gold-deep); }
.chip-green { background: var(--green-bg); color: var(--green); }
.chip-red { background: var(--red-bg); color: var(--red); }
.chip-blue { background: var(--blue-bg); color: var(--blue); }
.chip-gray { background: var(--surface-2); color: var(--tx-2); border:1px solid var(--line); }

.tag { display:inline-flex; padding:2px 8px; border-radius:5px; font-size:11.5px; font-weight:600;
  background: var(--surface-2); color: var(--tx-2); border:1px solid var(--line); }

input.field, select.field, textarea.field {
  width:100%; padding: 11px 13px; border:1px solid var(--line-strong); border-radius: var(--r-md);
  font-size: 14.5px; color: var(--tx); background: var(--surface); outline: none;
  transition: border-color .15s, box-shadow .15s;
}
input.field:focus, select.field:focus, textarea.field:focus {
  border-color: var(--gold); box-shadow: 0 0 0 3px rgba(229,168,35,.16);
}
.field-label { font-size: 12.5px; font-weight: 600; color: var(--tx-2); margin-bottom: 6px; display:block; }

/* Tables */
.tbl { width:100%; border-collapse: collapse; }
.tbl thead th { text-align:left; font-size: 11.5px; letter-spacing:.4px; text-transform: uppercase;
  color: var(--tx-3); font-weight:700; padding: 11px 14px; border-bottom: 1.5px solid var(--line);
  background: var(--surface-2); position: sticky; top: 0; z-index: 1; }
.tbl tbody td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 14px; }
.tbl tbody tr { transition: background .12s; }
.tbl tbody tr:hover { background: var(--surface-2); }
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl .r { text-align: right; }
.tbl .c { text-align: center; }

/* Section heading */
.sec-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; row-gap:10px; }
.sec-head h2 { font-size:18px; font-weight:700; margin:0; letter-spacing:-.2px; }
.sec-head .sub { font-size:13px; color: var(--tx-3); }
.sec-spacer { flex:1; }

/* Stat cards */
.stat { padding: 18px 18px 16px; position: relative; overflow: hidden; }
.stat-ico { width:42px; height:42px; border-radius: var(--r-md); display:grid; place-items:center; margin-bottom:14px; }
.stat-label { font-size: 13px; color: var(--tx-2); font-weight:500; }
.stat-val { font-size: 27px; font-weight: 700; letter-spacing:-.5px; margin: 4px 0 6px; }
.stat-val small { font-size: 15px; font-weight:600; color: var(--tx-3); }
.stat-delta { font-size: 12.5px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }

/* Empty state */
.empty { text-align:center; padding: 48px 20px; color: var(--tx-3); }
.empty svg { width: 46px; height:46px; opacity:.4; margin-bottom:12px; }

/* Modal */
.modal-back { position: fixed; inset:0; background: rgba(20,16,8,.5); backdrop-filter: blur(3px);
  display:flex; align-items:center; justify-content:center; z-index: 200; padding: 20px;
  animation: fade .18s ease; }
.modal { background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--sh-lg);
  width: 100%; max-width: 520px; max-height: 90vh; display:flex; flex-direction:column;
  animation: pop .22s cubic-bezier(.2,.9,.3,1.2); }
.modal-head { padding: 20px 22px; border-bottom: 1px solid var(--line); display:flex; align-items:center; gap:12px; }
.modal-head h3 { margin:0; font-size: 17px; font-weight:700; }
.modal-body { padding: 22px; overflow-y:auto; }
.modal-foot { padding: 16px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; }
.modal-x { margin-left:auto; width:34px; height:34px; border-radius:8px; border:none; background:var(--surface-2);
  cursor:pointer; display:grid; place-items:center; color:var(--tx-2); }
.modal-x:hover { background: var(--line); }

@keyframes fade { from{opacity:0} to{opacity:1} }
@keyframes pop { from{opacity:0; transform: translateY(12px) scale(.97)} to{opacity:1; transform:none} }
@keyframes slideup { from{opacity:0; transform: translateY(10px)} to{opacity:1; transform:none} }

/* Toast */
.toast-wrap { position: fixed; bottom: 24px; left:50%; transform:translateX(-50%); z-index:300;
  display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast { background: var(--ink); color: var(--on-ink); padding: 12px 18px; border-radius: var(--r-md);
  box-shadow: var(--sh-lg); font-size: 14px; font-weight:500; display:flex; align-items:center; gap:10px;
  animation: slideup .25s ease; }
.toast svg { width:18px; height:18px; color: var(--gold); }

/* scrollbars */
.content::-webkit-scrollbar, .modal-body::-webkit-scrollbar, .pos-cart-items::-webkit-scrollbar { width: 10px; }
.content::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 3px solid var(--bg); }
.content::-webkit-scrollbar-track { background: transparent; }

/* grids */
.grid { display:grid; gap: 16px; }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-2 { grid-template-columns: repeat(2, 1fr); }

@media (max-width: 1100px){ .g-4 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 1180px){ .hide-md { display:none !important; } }

/* ============================================================
   Responsive — tablet & mobile
   ============================================================ */
@media (max-width: 860px) {
  .sidebar { display: none; }
  .content { padding: 16px 14px 92px; }
  .topbar { padding: 0 16px; height: 58px; }
  .tb-search { display: none; }
  .botnav {
    display: flex; position: fixed; bottom: 0; left:0; right:0; z-index: 50;
    background: var(--ink); border-top: 1px solid rgba(255,255,255,.08);
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    justify-content: space-around;
  }
  .botnav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; color: var(--on-ink-2); cursor:pointer; padding: 4px; font-size: 10.5px; font-weight:600; }
  .botnav-item svg { width:23px; height:23px; }
  .botnav-item.active { color: var(--gold); }
  .botnav-fab { margin-top:-26px; }
  .botnav-fab .fab { width:54px; height:54px; border-radius:50%; background: linear-gradient(135deg,var(--gold),var(--gold-deep));
    display:grid; place-items:center; color: var(--ink); box-shadow: var(--sh-gold); margin-bottom:3px; }
  .botnav-fab .fab svg { width:26px; height:26px; }
  .g-4, .g-3, .g-2 { grid-template-columns: 1fr 1fr; }
  .hide-mobile { display:none !important; }
  .modal { max-width: 100%; }
  .stat-val { font-size: 23px; }
}
@media (max-width: 520px){
  .g-2.collapse-1 { grid-template-columns: 1fr; }
}

/* ============================================================
   Receipt document
   ============================================================ */
.receipt-doc { background:#fff; color:#1a1610; padding: 22px 22px 18px; border-radius: 12px;
  border: 1px solid var(--line); font-size: 13px; }
.rd-head { display:flex; gap:13px; align-items:center; padding-bottom:14px; border-bottom: 2px solid var(--ink); }
.rd-logo { width:54px; height:54px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 2px var(--gold-soft); }
.rd-name { font-size:18px; font-weight:800; letter-spacing:.3px; }
.rd-brand { font-size:11px; font-weight:700; letter-spacing:1.5px; color:var(--gold-deep); margin:1px 0 4px; }
.rd-meta { font-size:11.5px; color:#5c5547; line-height:1.5; }
.rd-title { text-align:center; font-size:13px; font-weight:700; letter-spacing:1px; padding:10px 0;
  background: var(--gold-wash); margin: 0 -22px 14px; }
.rd-info { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; margin-bottom:14px; }
.rd-info > div { display:flex; justify-content:space-between; gap:8px; font-size:12px; border-bottom:1px dotted var(--line-strong); padding-bottom:4px; }
.rd-info span { color:#8b8472; white-space:nowrap; }
.rd-info b { font-weight:600; text-align:right; }
.rd-tbl { width:100%; border-collapse:collapse; }
.rd-tbl thead th { font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; color:#8b8472;
  text-align:left; padding:6px 6px; border-bottom:1.5px solid var(--ink); }
.rd-tbl th.r { text-align:right; }
.rd-tbl td { padding:8px 6px; border-bottom:1px dashed var(--line); vertical-align:top; }
.rd-tbl td.r { text-align:right; }
.rd-iname { font-weight:600; font-size:12.5px; line-height:1.35; }
.rd-icode { font-size:10.5px; color:#8b8472; margin-top:2px; }
.rd-sum { margin-top:12px; }
.rd-sum-row { display:flex; justify-content:space-between; gap:10px; padding:5px 0; font-size:12.5px; color:#5c5547; }
.rd-sum-row span { white-space:nowrap; }
.rd-sum-row b { color:#1a1610; font-weight:600; }
.rd-total { border-top:2px solid; margin-top:4px; padding-top:9px; font-size:15px; }
.rd-total span { font-weight:700; color:#1a1610; white-space:nowrap; }
.rd-total b { font-size:18px; font-weight:800; }
.rd-pay { margin-top:10px; padding-top:10px; border-top:1px dashed var(--line-strong); }
.rd-foot { margin-top:16px; padding-top:12px; border-top:2px solid var(--ink); display:flex; align-items:center; justify-content:space-between; gap:10px; }
.rd-thanks { font-size:11.5px; color:#5c5547; font-style:italic; }
.rd-barcode { display:flex; flex-direction:column; align-items:center; color:#1a1610; }
.rd-barcode span { font-size:9px; letter-spacing:2px; margin-top:1px; }
.rd-bold .rd-title { background:var(--ink); color:var(--gold); }

.checkout-success { text-align:center; padding: 4px 0 20px; }
.cs-ring { width:64px; height:64px; border-radius:50%; background:var(--green-bg); color:var(--green);
  display:grid; place-items:center; margin:0 auto 12px; animation: pop .4s cubic-bezier(.2,.9,.3,1.3); }
.cs-title { font-size:18px; font-weight:700; }
.cs-sub { font-size:13.5px; color:var(--tx-3); margin-top:3px; }

/* ---- print ---- */
@media print {
  body.printing * { visibility: hidden !important; }
  body.printing #print-area, body.printing #print-area * { visibility: visible !important; }
  body.printing #print-area { position: fixed; inset:0; margin:0; padding:0; }
  body.printing #print-area .receipt-doc { border:none; border-radius:0; width:80mm; margin:0 auto; box-shadow:none; }
  @page { size: 80mm auto; margin: 4mm; }
}

/* ============================================================
   POS screen
   ============================================================ */
.pos-wrap { display:flex; gap:0; height:100%; }
.pos-products { flex:1; min-width:0; display:flex; flex-direction:column; padding:18px 18px 18px; overflow-y:auto; }
.pos-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:14px; }
.pos-toolbar .tb-search { background:var(--surface); }
.pos-cats { display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; margin-bottom:6px; scrollbar-width:none; }
.pos-cats::-webkit-scrollbar { display:none; }
.cat-pill { flex-shrink:0; padding:8px 16px; border-radius:30px; border:1px solid var(--line-strong);
  background:var(--surface); color:var(--tx-2); font-size:13.5px; font-weight:600; cursor:pointer; transition:all .15s; }
.cat-pill:hover { border-color:var(--gold); }
.cat-pill.active { background:var(--ink); color:#fff; border-color:var(--ink); }

.pos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(168px,1fr)); gap:13px; }
.prod-card { text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
  padding:14px; cursor:pointer; transition:transform .12s, box-shadow .15s, border-color .15s; display:flex; flex-direction:column; gap:6px; }
.prod-card:hover:not(:disabled) { transform:translateY(-3px); box-shadow:var(--sh-md); border-color:var(--gold-soft); }
.prod-card:disabled { opacity:.5; cursor:not-allowed; }
.prod-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
.dot-stk { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
.dot-stk.gold { background:var(--gold-wash); color:var(--gold-deep); }
.dot-stk.red { background:var(--red-bg); color:var(--red); }

</style></head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" crossorigin="anonymous"></script>
<script>
/* ============================================================
   JP168 POS — Data layer  (Supabase cloud DB — shared across devices)
   Two logical databases:
     products  — DB1 รายการสินค้า (code, name, category, size…)
     prices    — DB2 ราคาต่อหน่วย (price/cost/stock keyed by productId)
   Receipts + config (seq counter) stored in Supabase.
   In-memory state is the UI source of truth; Supabase is the
   authoritative store.  Realtime + 15-second polling keep all
   devices in sync.
   ============================================================ */
(function () {
  const SUPABASE_URL = 'https://atjnkwpgkxqomkmacdcj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_dmYvkW1kVIVHK48oF4smcg_rVLY9AzO';

  /* ---------- In-memory state (UI reads these synchronously) ---------- */
  let _products = [];
  let _prices   = {};   // { [productId]: {price,cost,stock} }
  let _receipts = [];
  let _seq      = 0;

  /* ---------- Reactive listeners (mirror of old subscribe pattern) ---- */
  const listeners = new Set();
  function emit() { listeners.forEach(fn => fn()); }

  /* ---------- Supabase client ---------------------------------------- */
  // window.supabase is loaded from the Supabase CDN <script> before this
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ---------- Load all data from Supabase ----------------------------- */
  async function loadAll() {
    const [p, pr, r, c] = await Promise.all([
      sb.from('products').select('*').order('created_at', { ascending: true }),
      sb.from('prices').select('*'),
      sb.from('receipts').select('*').order('date', { ascending: false }),
      sb.from('config').select('*'),
    ]);

    if (p.error) throw new Error('โหลดสินค้าไม่ได้: ' + p.error.message);

    _products = p.data || [];

    _prices = {};
    (pr.data || []).forEach(row => {
      _prices[row.product_id] = { price: row.price, cost: row.cost, stock: row.stock };
    });

    _receipts = (r.data || []).map(row => ({
      ...row,
      items: Array.isArray(row.items) ? row.items : JSON.parse(row.items || '[]'),
    }));

    const seqRow = (c.data || []).find(x => x.key === 'seq');
    _seq = seqRow ? parseInt(seqRow.value) : 0;
    // One-time migration: reset old high seq values (pre-JP69 format) to 0
    if (_seq > 1000) {
      _seq = 0;
      Promise.resolve(sb.from('config').upsert({ key: 'seq', value: '0' }, { onConflict: 'key' })).catch(() => {});
    }

    emit();
  }

  /* ---------- Realtime + polling for cross-device sync --------------- */
  let _lastLoad = 0;
  function scheduleLoad() {
    const now = Date.now();
    if (now - _lastLoad < 800) return;   // debounce rapid fire
    _lastLoad = now;
    loadAll().catch(() => {});
  }

  function setupSync() {
    // Realtime (best-effort — requires Realtime enabled on Supabase tables)
    try {
      sb.channel('jp168-sync')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'products' },  scheduleLoad)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'prices' },    scheduleLoad)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'receipts' },  scheduleLoad)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'config' },    scheduleLoad)
        .subscribe();
    } catch (e) { /* ignore if Realtime not available */ }

    // Polling fallback — keeps other devices in sync even without Realtime
    setInterval(scheduleLoad, 15000);
  }

  /* ---------- DB interface ------------------------------------------- */
  const DB = {
    /* --- read (synchronous — return in-memory state) --- */
    getProducts() { return _products; },
    getPrices()   { return _prices; },
    getReceipts() { return _receipts; },

    getCatalog() {
      return _products.map(p => ({
        ...p,
        ...(_prices[p.id] || { price: 0, cost: 0, stock: 0 }),
      }));
    },

    /* --- write: optimistic update → async Supabase sync --- */
    upsertProduct(p) {
      // 1. Optimistic in-memory update
      const prod = {
        id: p.id, code: p.code, name: p.name, category: p.category,
        size: p.size, color: p.color || '-', unit: p.unit,
      };
      const ix = _products.findIndex(x => x.id === p.id);
      if (ix >= 0) _products[ix] = { ..._products[ix], ...prod };
      else         _products.unshift(prod);

      _prices[p.id] = {
        price: Number(p.price) || 0,
        cost:  Number(p.cost)  || 0,
        stock: Number(p.stock) || 0,
      };
      emit();

      // 2. Persist to Supabase
      sb.from('products')
        .upsert(prod, { onConflict: 'id' })
        .then(() => sb.from('prices').upsert(
          { product_id: p.id, ..._prices[p.id] },
          { onConflict: 'product_id' }
        ))
        .catch(() => window.jpToast && window.jpToast('บันทึกสินค้าล้มเหลว', 'alert'));
    },

    deleteProduct(id) {
      _products = _products.filter(p => p.id !== id);
      delete _prices[id];
      emit();

      // CASCADE in DB will delete prices row automatically
      Promise.resolve(sb.from('products').delete().eq('id', id))
        .catch(() => window.jpToast && window.jpToast('ลบสินค้าล้มเหลว', 'alert'));
    },

    setPrice(id, patch) {
      _prices[id] = { ...(_prices[id] || { price: 0, cost: 0, stock: 0 }), ...patch };
      emit();

      Promise.resolve(sb.from('prices')
        .upsert({ product_id: id, ..._prices[id] }, { onConflict: 'product_id' }))
        .catch(() => window.jpToast && window.jpToast('บันทึกราคาล้มเหลว', 'alert'));
    },

    nextNo() {
      _seq += 1;
      const no = 'JP--' + String(_seq).padStart(4, '0');
      // fire-and-forget; minor race condition on concurrent devices is acceptable
      Promise.resolve(sb.from('config').upsert({ key: 'seq', value: String(_seq) }, { onConflict: 'key' })).catch(() => {});
      return no;
    },

    addReceipt(r) {
      // Optimistic
      _receipts.unshift(r);
      r.items.forEach(it => {
        if (_prices[it.productId]) {
          _prices[it.productId].stock = Math.max(0, (_prices[it.productId].stock || 0) - it.qty);
        }
      });
      emit();

      // Persist receipt (items is JSONB — pass array directly)
      sb.from('receipts').insert({ ...r })
        .then(() => Promise.all(
          r.items
            .filter(it => _prices[it.productId])
            .map(it => sb.from('prices')
              .update({ stock: _prices[it.productId].stock })
              .eq('product_id', it.productId)
            )
        ))
        .catch(() => window.jpToast && window.jpToast('บันทึกบิลล้มเหลว', 'alert'));
    },

    deleteReceipt(id) {
      _receipts = _receipts.filter(r => r.id !== id);
      emit();

      Promise.resolve(sb.from('receipts').delete().eq('id', id))
        .catch(() => window.jpToast && window.jpToast('ลบบิลล้มเหลว', 'alert'));
    },

    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },

    async renumberReceipts() {
      const { error } = await sb.rpc('renumber_receipts');
      if (error) throw new Error('เรียงเลขบิลล้มเหลว: ' + error.message);
      const { count } = await sb.from('receipts').select('*', { count: 'exact', head: true });
      await sb.from('config').upsert({ key: 'seq', value: String(count || 0) }, { onConflict: 'key' });
      await loadAll();
      return count || 0;
    },

    backupAllData() {
      const receipts = _receipts;
      const products = _products.map(p => ({ ...p, ...(_prices[p.id] || {}) }));
      const XLSX = window.XLSX;

      // Sheet 1: บิลทั้งหมด
      const billRows = [['เลขบิล','วันที่','เวลา','ลูกค้า','ชำระ','ยอดรวม','ส่วนลด','รายการสินค้า']];
      [...receipts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(r => {
        const d = new Date(r.date);
        billRows.push([
          r.no,
          d.toLocaleDateString('th-TH'),
          d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
          r.customer || 'ลูกค้าทั่วไป',
          r.payment,
          r.total,
          r.discount || 0,
          (r.items||[]).map(i=>i.name+' ('+i.size+') x'+i.qty+' ฿'+i.price).join(' | ')
        ]);
      });

      // Sheet 2: รายการสินค้า
      const prodRows = [['รหัส','ชื่อสินค้า','หมวดหมู่','ไซส์','สี','ราคา','ต้นทุน','สต๊อก']];
      products.forEach(p => prodRows.push([p.code,p.name,p.category,p.size,p.color,p.price||0,p.cost||0,p.stock||0]));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(billRows), 'บิลทั้งหมด');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(prodRows), 'รายการสินค้า');

      const date = new Date().toLocaleDateString('th-TH').replace(/\//g,'-');
      XLSX.writeFile(wb, 'JP168_Backup_' + date + '.xlsx');
    },

    downloadImportTemplate() {
      const XLSX = window.XLSX;
      const headers = ['เลขบิล','วันที่ (วว/ดด/ปปปป พ.ศ.)','เวลา (นน:นน)','ลูกค้า','ชำระโดย (เงินสด/โอน/บัตร)','ส่วนลด (บาท)','รหัสสินค้า','ชื่อสินค้า','ไซส์','จำนวน','ราคาต่อชิ้น (บาท)'];
      const note = ['** บิลเดียวกันที่มีหลายรายการ ให้ใส่เลขบิล/วันที่/ลูกค้า/ชำระโดย ซ้ำในแต่ละแถว','','','','','','','','','',''];
      const ex1 = ['JP--0002','01/03/2569','10:54','ลูกค้าทั่วไป','เงินสด',0,'JP-0535','คอกลม (ฟอก)','Free',52,100];
      const ex2 = ['JP--0003','02/03/2569','09:11','K.ส้ม','เงินสด',0,'JP-001','คอกลม (สั้น)','S',3,120];
      const ex3 = ['JP--0003','02/03/2569','09:11','K.ส้ม','เงินสด',0,'JP-002','คอกลม (สั้น)','M',3,120];
      const ws = XLSX.utils.aoa_to_sheet([headers, note, ex1, ex2, ex3]);
      ws['!cols'] = [14,22,12,16,20,12,14,20,8,8,16].map(w=>({wch:w}));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Import Template');
      XLSX.writeFile(wb, 'JP168_Import_Template.xlsx');
    },

    async importReceiptsFromExcel(file, onProgress) {
      const XLSX = window.XLSX;
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      // Row 0 = headers, Row 1 = note — skip both
      const dataRows = rows.slice(2).filter(r => String(r[0]||'').trim() && String(r[6]||'').trim());
      if (dataRows.length === 0) throw new Error('ไม่พบข้อมูลในไฟล์ (ตรวจสอบว่ากรอกข้อมูลตั้งแต่แถวที่ 3)');

      const billMap = new Map();
      dataRows.forEach(r => {
        const no = String(r[0]).trim();
        const dateStr = String(r[1]).trim();
        const timeStr = String(r[2]).trim() || '00:00';
        const customer = String(r[3]).trim() || 'ลูกค้าทั่วไป';
        const payment = ['เงินสด','โอน','บัตร'].includes(String(r[4]).trim()) ? String(r[4]).trim() : 'เงินสด';
        const discount = Number(r[5]) || 0;
        const productCode = String(r[6]).trim();
        const productName = String(r[7]).trim() || productCode;
        const size = String(r[8]).trim() || '-';
        const qty = Number(r[9]) || 0;
        const price = Number(r[10]) || 0;

        if (!billMap.has(no)) {
          let iso = new Date().toISOString();
          try {
            const rawDate = r[1];
            const [hh, mn] = timeStr.split(':').map(Number);
            if (typeof rawDate === 'number' && rawDate > 100) {
              // Excel serial date → UTC date
              const d = new Date(Math.round((rawDate - 25569) * 86400000));
              let yr = d.getUTCFullYear();
              const yyyyCE = yr > 2400 ? yr - 543 : yr;
              iso = new Date(yyyyCE, d.getUTCMonth(), d.getUTCDate(), hh || 0, mn || 0, 0).toISOString();
            } else {
              const parts = String(rawDate).trim().split('/');
              if (parts.length === 3) {
                const dd = parseInt(parts[0]), mm2 = parseInt(parts[1]), yyyyBE = parseInt(parts[2]);
                const yyyyCE = yyyyBE > 2400 ? yyyyBE - 543 : yyyyBE;
                iso = new Date(yyyyCE, mm2 - 1, dd, hh || 0, mn || 0, 0).toISOString();
              }
            }
          } catch(e) {}
          billMap.set(no, { no, date: iso, customer, payment, discount, items: [] });
        }

        if (qty > 0) {
          billMap.get(no).items.push({ productId: productCode, name: productName, size, qty, price });
        }
      });

      let idx = 0;
      const receipts = [];
      billMap.forEach(bill => {
        const subtotal = bill.items.reduce((s, it) => s + it.qty * it.price, 0);
        const total = Math.max(0, subtotal - (bill.discount || 0));
        receipts.push({
          id: 'imp' + Date.now().toString(36) + String(idx++).padStart(5,'0'),
          no: bill.no,
          date: bill.date,
          customer: bill.customer,
          payment: bill.payment,
          discount: bill.discount || 0,
          subtotal,
          vat: 0,
          total,
          cash: total,
          items: bill.items,
        });
      });

      if (receipts.length === 0) throw new Error('ไม่พบบิลที่ถูกต้องในไฟล์');

      // Insert in batches of 20
      for (let i = 0; i < receipts.length; i += 20) {
        onProgress && onProgress(i, receipts.length);
        const { error } = await sb.from('receipts').insert(receipts.slice(i, i + 20));
        if (error) throw new Error('บันทึกบิลที่ ' + (i + 1) + ' ล้มเหลว: ' + error.message);
      }

      // Sync seq counter
      const maxSeq = receipts.reduce((m, r) => Math.max(m, parseInt((r.no||'').replace('JP--',''))||0), 0);
      if (maxSeq > _seq) {
        _seq = maxSeq;
        await sb.from('config').upsert({ key: 'seq', value: String(_seq) }, { onConflict: 'key' });
      }

      await loadAll();
      return receipts.length;
    },

    resetAll() {
      Promise.all([
        sb.from('receipts').delete().neq('id', ''),
        sb.from('prices').delete().neq('product_id', ''),
      ])
        .then(() => sb.from('products').delete().neq('id', ''))
        .then(() => sb.from('config').upsert({ key: 'seq', value: '0' }, { onConflict: 'key' }))
        .then(() => loadAll())
        .catch(e => window.jpToast && window.jpToast('รีเซ็ตล้มเหลว: ' + e.message, 'alert'));
    },

    /* ready: Promise — resolves when initial data is loaded */
    ready: null,
  };

  /* ---------- Formatting helpers ------------------------------------- */
  const fmt = {
    baht(n)    { return '฿' + (n||0).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); },
    baht2(n)   { return (n||0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); },
    num(n)     { return (n||0).toLocaleString('th-TH'); },
    date(iso)  { const d = new Date(iso); return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' }); },
    dateLong(iso) { const d = new Date(iso); return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }); },
    time(iso)  { const d = new Date(iso); return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); },
    dt(iso)    { return fmt.date(iso) + ' · ' + fmt.time(iso); },
  };

  const SHOP = {
    name:    'JP 75 T-SHIRT',
    brand:   'JP168 T-SHIRT & SPORT',
    tel:     '085-174-3150',
    reg:     '1101500694123',
    address: 'ร้านเสื้อผ้ากีฬา & สกรีนเสื้อ',
  };

  function makeHook(React) {
    return function useStore(selector) {
      const [, force] = React.useReducer(x => x + 1, 0);
      React.useEffect(() => DB.subscribe(force), []);
      return selector ? selector(DB) : DB;
    };
  }

  /* ---------- Bootstrap ---------------------------------------------- */
  DB.ready = loadAll()
    .then(() => { setupSync(); })
    .catch(e => { throw e; });

  window.JPDB         = DB;
  window.JPFMT        = fmt;
  window.JPSHOP       = SHOP;
  window.makeUseStore = makeHook;
})();
</script>

<script type="text/babel">
/* ============================================================
   JP168 POS — Shared UI primitives
   ============================================================ */
(function () {
  const { useState, useEffect, useRef } = React;
  const Icon = window.Icon;
  const fmt = window.JPFMT;

  // ---------- Modal ----------
  function Modal({ title, icon, children, onClose, footer, width=520 }) {
    useEffect(() => {
      const h = (e) => { if (e.key === 'Escape') onClose && onClose(); };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, []);
    const content = (
      <div className="modal-back" onMouseDown={(e)=>{ if(e.target===e.currentTarget) onClose&&onClose(); }}>
        <div className="modal" style={{ maxWidth: width }} role="dialog" aria-modal="true">
          {title && (
            <div className="modal-head">
              {icon && <div style={{ width:38, height:38, borderRadius:10, background:'var(--gold-wash)', color:'var(--gold-deep)', display:'grid', placeItems:'center' }}><Icon name={icon} size={20}/></div>}
              <h3>{title}</h3>
              <button className="modal-x" onClick={onClose} aria-label="ปิด"><Icon name="x" size={18}/></button>
            </div>
          )}
          <div className="modal-body">{children}</div>
          {footer && <div className="modal-foot">{footer}</div>}
        </div>
      </div>
    );
    return ReactDOM.createPortal(content, document.body);
  }

  // ---------- Toast ----------
  let pushToastFn = null;
  function ToastHost() {
    const [items, setItems] = useState([]);
    useEffect(() => {
      pushToastFn = (msg, icon='check') => {
        const id = Math.random().toString(36).slice(2);
        setItems(s => [...s, { id, msg, icon }]);
        setTimeout(() => setItems(s => s.filter(t => t.id !== id)), 2600);
      };
      return () => { pushToastFn = null; };
    }, []);
    return (
      <div className="toast-wrap">
        {items.map(t => (
          <div className="toast" key={t.id}><Icon name={t.icon} size={18}/>{t.msg}</div>
        ))}
      </div>
    );
  }
  window.jpToast = (msg, icon) => { if (pushToastFn) pushToastFn(msg, icon); };

  // ---------- Confirm ----------
  function Confirm({ title, message, confirmText='ยืนยัน', danger, onConfirm, onClose }) {
    return (
      <Modal title={title} icon={danger?'alert':'check'} onClose={onClose} width={440}
        footer={<>
          <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className={'btn '+(danger?'btn-danger':'btn-gold')} onClick={()=>{ onConfirm(); onClose(); }}>{confirmText}</button>
        </>}>
        <p style={{ margin:0, color:'var(--tx-2)', fontSize:14.5, lineHeight:1.6 }}>{message}</p>
      </Modal>
    );
  }

  // ---------- Category color / thumb ----------
  const CAT_COLOR = {
    'เสื้อคอกลม (แขนสั้น)': ['#E9EEF6','#3E6CA8'],
    'เสื้อคอกลม (แขนยาว)':  ['#FBF1D6','#C28A12'],
    'เสื้อคอวี':             ['#FBEAE6','#C0432F'],
    'เสื้อเด็ก':             ['#E9F1EC','#2E8B57'],
  };
  function catColor(cat){ return CAT_COLOR[cat] || ['#F0EDE4','#7A7059']; }

  function ProductThumb({ product, size=46, radius=12 }) {
    const [bg, fg] = catColor(product.category);
    const iconName = product.category === 'อุปกรณ์' ? 'package2'
      : product.category === 'กางเกง' ? 'tag' : 'shirt';
    return (
      <div style={{ width:size, height:size, borderRadius:radius, background:bg, color:fg,
        display:'grid', placeItems:'center', flexShrink:0, position:'relative' }}>
        <Icon name={iconName} size={size*0.5} strokeWidth={1.8}/>
        <span style={{ position:'absolute', bottom:-3, right:-3, background:'var(--ink)', color:'#fff',
          fontSize:9, fontWeight:700, padding:'1px 4px', borderRadius:5, lineHeight:1.3 }}>{product.size}</span>
      </div>
    );
  }

  // ---------- Segmented control ----------
  function Seg({ value, options, onChange, size='md' }) {
    return (
      <div style={{ display:'inline-flex', background:'var(--surface-2)', border:'1px solid var(--line)',
        borderRadius:10, padding:3, gap:2 }}>
        {options.map(o => {
          const val = typeof o==='string'?o:o.value; const label = typeof o==='string'?o:o.label;
          const active = val===value;
          return (
            <button key={val} onClick={()=>onChange(val)}
              style={{ border:'none', cursor:'pointer', borderRadius:7,
                padding: size==='sm'?'5px 10px':'7px 14px', fontSize: size==='sm'?12.5:13.5, fontWeight:600,
                background: active?'var(--surface)':'transparent', color: active?'var(--tx)':'var(--tx-3)',
                boxShadow: active?'var(--sh-sm)':'none', transition:'all .15s', display:'flex', alignItems:'center', gap:6 }}>
              {typeof o!=='string' && o.icon && <Icon name={o.icon} size={15}/>}
              {label}
            </button>
          );
        })}
      </div>
    );
  }

  // ---------- Stat card ----------
  function Stat({ icon, iconBg, iconFg, label, value, unit, delta, deltaDir }) {
    return (
      <div className="card stat">
        <div className="stat-ico" style={{ background:iconBg||'var(--gold-wash)', color:iconFg||'var(--gold-deep)' }}>
          <Icon name={icon} size={21}/>
        </div>
        <div className="stat-label">{label}</div>
        <div className="stat-val num">{value}{unit && <small> {unit}</small>}</div>
        {delta!=null && (
          <div className="stat-delta" style={{ color: deltaDir==='down'?'var(--red)':'var(--green)' }}>
            <Icon name={deltaDir==='down'?'trendDown':'trendUp'} size={14}/> {delta}
          </div>
        )}
      </div>
    );
  }

  // ---------- Stock badge ----------
  function StockBadge({ stock }) {
    if (stock <= 0) return <span className="chip chip-red">หมด</span>;
    if (stock < 25) return <span className="chip chip-gold">เหลือน้อย · {stock}</span>;
    return <span className="chip chip-green num">{stock} {''}</span>;
  }

  Object.assign(window, { Modal, ToastHost, Confirm, ProductThumb, Seg, Stat, StockBadge, catColor });
})();
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

            {r.payment==='เงินสด' && <>
              <div className="rd-sum-row"><span>รับเงิน</span><b className="num">{fmt.baht2(r.cash)}</b></div>
              <div className="rd-sum-row"><span>เงินทอน</span><b className="num">{fmt.baht2(Math.max(0,change))}</b></div>
            </>}
          </div>
        </div>

        <div className="rd-foot">
          <div className="rd-thanks">ขอบคุณที่อุดหนุน JP168 · แล้วพบกันใหม่</div>
          <div className="rd-barcode"><Icon name="barcode" size={26} strokeWidth={2.4}/><span className="num">{r.no}</span></div>
        </div>
      </div>
    );
  }

  function printReceipt() {
    document.body.classList.add('printing');
    const after = () => { document.body.classList.remove('printing'); window.removeEventListener('afterprint', after); };
    window.addEventListener('afterprint', after);
    setTimeout(()=>window.print(), 60);
  }

  function ReceiptModal({ receipt, onClose, variant, success }) {
    if (!receipt) return null;
    return (
      <Modal onClose={onClose} width={460}
        footer={<>
          <button className="btn btn-ghost" onClick={onClose}>ปิด</button>
          <button className="btn btn-ghost" onClick={()=>window.jpToast('บันทึก PDF เรียบร้อย','pdf')}><Icon name="pdf" size={17}/> PDF</button>
          <button className="btn btn-gold" onClick={printReceipt}><Icon name="print" size={17}/> พิมพ์บิล</button>
        </>}>
        {success && (
          <div className="checkout-success">
            <div className="cs-ring"><Icon name="check" size={30} strokeWidth={3}/></div>
            <div className="cs-title">บันทึกการขายสำเร็จ</div>
            <div className="cs-sub">บิล {receipt.no} · {fmt.baht(receipt.total)}</div>
          </div>
        )}
        <div id="print-area">
          <ReceiptDoc receipt={receipt} variant={variant}/>
        </div>
      </Modal>
    );
  }

  Object.assign(window, { ReceiptDoc, ReceiptModal, printReceipt });
})();
</script>
<script type="text/babel">
/* ============================================================
   JP168 POS — Import / Export (Excel · PDF)
   ============================================================ */
(function () {
  const { useState, useRef } = React;
  const Icon = window.Icon;
  const { Modal } = window;

  // ชื่อคอลัมน์ที่รับได้ (ภาษาไทย/อังกฤษ)
  const COL_ALIASES = {
    code:     ['รหัสสินค้า','รหัส','code','sku'],
    name:     ['ชื่อสินค้า','ชื่อ','name','สินค้า','product'],
    category: ['หมวดหมู่','category','ประเภท','หมวด'],
    size:     ['ไซส์','size','ขนาด'],
    color:    ['สี','color','colour'],
    price:    ['ราคา / หน่วย','ราคา/หน่วย','ราคาต่อหน่วย','ราคา','ราคาขาย','price'],
    cost:     ['ต้นทุน','ราคาทุน','cost'],
    stock:    ['สต๊อก','สต็อก','stock','จำนวน','qty'],
    unit:     ['หน่วยนับ','หน่วย','unit'],
  };

  function buildColIndex(headers) {
    const idx = {};
    headers.forEach((h, i) => {
      const norm = String(h||'').trim().toLowerCase();
      for (const [field, aliases] of Object.entries(COL_ALIASES)) {
        if (!(field in idx) && aliases.some(a => a.toLowerCase() === norm)) idx[field] = i;
      }
    });
    return idx;
  }

  function parseFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = window.XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          if (rows.length < 2) return reject(new Error('ไฟล์ไม่มีข้อมูล'));
          const idx = buildColIndex(rows[0]);
          const missing = ['code','name'].filter(f => !(f in idx));
          if (missing.length) return reject(new Error('ไม่พบคอลัมน์: ' + missing.map(f=>COL_ALIASES[f][0]).join(', ')));
          const data = rows.slice(1)
            .filter(r => r.some(c => String(c).trim()))
            .map(r => ({
              id:       crypto.randomUUID(),
              code:     String(r[idx.code]||'').trim(),
              name:     String(r[idx.name]||'').trim(),
              category: String(idx.category!=null ? r[idx.category] : '').trim() || 'ทั่วไป',
              size:     String(idx.size!=null ? r[idx.size] : '').trim() || '-',
              color:    String(idx.color!=null ? r[idx.color] : '').trim() || '-',
              unit:     '-',
              price:    Number(idx.price!=null ? r[idx.price] : 0) || 0,
              cost:     Number(idx.cost!=null  ? r[idx.cost]  : 0) || 0,
              stock:    Number(idx.stock!=null ? r[idx.stock] : 0) || 0,
            }))
            .filter(r => r.code && r.name);
          resolve(data);
        } catch(err) { reject(err); }
      };
      reader.onerror = () => reject(new Error('อ่านไฟล์ไม่ได้'));
      reader.readAsArrayBuffer(file);
    });
  }

  function ImportExport({ mode, target='ข้อมูล', onClose }) {
    const [stage, setStage] = useState(mode==='import' ? 'drop' : 'pick');
    const [fileName, setFileName] = useState('');
    const [fmt, setFmt] = useState('excel');
    const [busy, setBusy] = useState(false);
    const [rows, setRows] = useState([]);
    const [error, setError] = useState('');
    const [dragging, setDragging] = useState(false);
    const fileRef = useRef();

    async function handleFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['xlsx','xls','csv'].includes(ext)) { setError('รองรับเฉพาะ .xlsx, .xls, .csv'); return; }
      setError('');
      try {
        const data = await parseFile(file);
        if (!data.length) { setError('ไม่พบข้อมูลสินค้าในไฟล์'); return; }
        setRows(data); setFileName(file.name); setStage('preview');
      } catch(e) { setError(e.message || 'อ่านไฟล์ไม่ได้'); }
    }

    function onDrop(e) {
      e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]);
    }

    function doImport() {
      setBusy(true);
      try {
        const existing = window.JPDB.getProducts();
        rows.forEach(r => {
          const found = existing.find(p => p.code === r.code);
          window.JPDB.upsertProduct(found ? { ...r, id: found.id } : r);
        });
        window.jpToast('นำเข้าสินค้าสำเร็จ ' + rows.length + ' รายการ', 'excel');
        onClose();
      } catch(e) {
        window.jpToast('นำเข้าไม่สำเร็จ: ' + (e.message||''), 'alert');
        setBusy(false);
      }
    }

    function doExport(){
      setBusy(true);
      setTimeout(()=>{ setBusy(false); window.jpToast('ส่งออก'+target+'เป็น '+(fmt==='excel'?'Excel':'PDF')+' เรียบร้อย', fmt==='excel'?'excel':'pdf'); onClose(); }, 1100);
    }

    // ---- IMPORT ----
    if (mode==='import') {
      return (
        <Modal title={'นำเข้า'+target+'จาก Excel'} icon="upload" onClose={onClose} width={520}
          footer={ stage==='preview' ? <>
            <button className="btn btn-ghost" onClick={()=>{ setStage('drop'); setRows([]); setError(''); }}>เลือกไฟล์ใหม่</button>
            <button className="btn btn-gold" onClick={doImport} disabled={busy}>{busy?'กำลังนำเข้า…':<><Icon name="check" size={17}/> ยืนยันนำเข้า {rows.length} รายการ</>}</button>
          </> : <button className="btn btn-ghost" onClick={onClose}>ปิด</button> }>
          {stage==='drop' ? (
            <>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}}
                onChange={e=>handleFile(e.target.files[0])}/>
              <div className="io-drop"
                style={dragging?{borderColor:'var(--gold)',background:'var(--gold-wash)'}:{}}
                onClick={()=>fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();setDragging(true);}}
                onDragLeave={()=>setDragging(false)}
                onDrop={onDrop}>
                <div className="io-drop-ico"><Icon name="excel" size={32}/></div>
                <div style={{fontWeight:700, fontSize:15}}>ลากไฟล์ Excel มาวาง หรือคลิกเพื่อเลือก</div>
                <div className="muted" style={{fontSize:13, marginTop:4}}>รองรับ .xlsx, .xls, .csv (สูงสุด 10MB)</div>
              </div>
              {error && <div style={{color:'var(--red)',fontSize:13,marginTop:8,padding:'8px 12px',background:'var(--red-bg)',borderRadius:8}}>{error}</div>}
              <div className="io-note">
                <Icon name="alert" size={16}/>
                <div>ไฟล์ต้องมีคอลัมน์: <b>รหัสสินค้า, ชื่อสินค้า, หมวดหมู่, ไซส์, สี, ราคา, สต๊อก</b> — <a className="io-link" onClick={()=>window.jpToast('ดาวน์โหลดเทมเพลตเรียบร้อย','excel')}>ดาวน์โหลดเทมเพลต</a></div>
              </div>
            </>
          ) : (
            <>
              <div className="io-file"><div className="io-file-ico"><Icon name="excel" size={22}/></div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{fileName}</div><div className="muted" style={{fontSize:12}}>พบ {rows.length} แถว</div></div><span className="chip chip-green"><Icon name="check" size={14}/> อ่านสำเร็จ</span></div>
              <div className="io-prev-label">ตัวอย่างข้อมูล (3 แถวแรก)</div>
              <div className="card" style={{overflow:'hidden', marginTop:8}}>
                <table className="tbl" style={{fontSize:12.5}}>
                  <thead><tr><th>รหัส</th><th>ชื่อ</th><th>ไซส์</th><th className="r">ราคา</th></tr></thead>
                  <tbody>
                    {rows.slice(0,3).map((r,i)=>(
                      <tr key={i}><td className="num">{r.code}</td><td>{r.name}</td><td>{r.size}</td><td className="r num">฿{r.price.toLocaleString('th-TH')}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}
        </Modal>
      );
    }

    // ---- EXPORT ----
    return (
      <Modal title={'ส่งออก'+target} icon="download" onClose={onClose} width={480}
        footer={<><button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-gold" onClick={doExport} disabled={busy}>{busy?'กำลังสร้างไฟล์…':<><Icon name="download" size={17}/> ดาวน์โหลด</>}</button></>}>
        <div className="field-label">เลือกรูปแบบไฟล์</div>
        <div className="grid g-2" style={{gridTemplateColumns:'1fr 1fr', gap:12}}>
          <button className={'io-fmt'+(fmt==='excel'?' active':'')} onClick={()=>setFmt('excel')}>
            <div className="io-fmt-ico" style={{background:'#E6F2EA',color:'#1D7A47'}}><Icon name="excel" size={26}/></div>
            <b>Excel (.xlsx)</b><span>แก้ไขต่อได้ · มีสูตรรวมยอด</span>
            {fmt==='excel'&&<span className="io-fmt-check"><Icon name="check" size={14}/></span>}
          </button>
          <button className={'io-fmt'+(fmt==='pdf'?' active':'')} onClick={()=>setFmt('pdf')}>
            <div className="io-fmt-ico" style={{background:'#FBEAE6',color:'#C0432F'}}><Icon name="pdf" size={26}/></div>
            <b>PDF</b><span>พร้อมพิมพ์ · มีโลโก้ร้าน</span>
            {fmt==='pdf'&&<span className="io-fmt-check"><Icon name="check" size={14}/></span>}
          </button>
        </div>
        <div className="io-opt">
          <label className="io-check"><input type="checkbox" defaultChecked/> รวมหัวกระดาษโลโก้ร้าน JP168</label>
          <label className="io-check"><input type="checkbox" defaultChecked/> รวมคอลัมน์ราคาและสต๊อก</label>
          <label className="io-check"><input type="checkbox"/> เฉพาะรายการที่กรองอยู่</label>
        </div>
      </Modal>
    );
  }

  window.ImportExport = ImportExport;
})();
</script>
<script type="text/babel">
/* ============================================================
   JP168 POS — Dashboard (สรุปยอดขาย)
   ============================================================ */
(function () {
  const { useMemo } = React;
  const Icon = window.Icon, fmt = window.JPFMT;
  const { Stat, ProductThumb } = window;

  function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }

  function Dashboard({ go }) {
    const DB = window.JPDB;
    const receipts = DB.getReceipts();
    const catalog = DB.getCatalog();

    const metrics = useMemo(() => {
      const now = new Date();
      const today0 = startOfDay(now).getTime();
      const month0 = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      let today=0, todayBills=0, month=0, monthBills=0, totalUnits=0;
      const prodCount = {};
      receipts.forEach(r => {
        const t = new Date(r.date).getTime();
        if (t>=today0){ today+=r.total; todayBills++; }
        if (t>=month0){ month+=r.total; monthBills++; }
        r.items.forEach(it => { prodCount[it.productId]=(prodCount[it.productId]||0)+it.qty; totalUnits+=it.qty; });
      });
      // 7-day series
      const days=[];
      for (let i=6;i>=0;i--){
        const d=startOfDay(new Date(now.getTime()-i*86400000));
        const next=d.getTime()+86400000;
        const sum=receipts.filter(r=>{const t=new Date(r.date).getTime();return t>=d.getTime()&&t<next;}).reduce((s,r)=>s+r.total,0);
        days.push({ label:['อา','จ','อ','พ','พฤ','ศ','ส'][d.getDay()], date:d, sum });
      }
      const top = Object.entries(prodCount).map(([id,qty])=>({ ...catalog.find(c=>c.id===id), qty }))
        .filter(x=>x.id).sort((a,b)=>b.qty-a.qty).slice(0,5);
      const avg = monthBills? month/monthBills : 0;
      return { today, todayBills, month, monthBills, days, top, avg, totalUnits };
    }, [receipts, catalog]);

    const maxDay = Math.max(...metrics.days.map(d=>d.sum), 1);
    const lowStock = catalog.filter(c=>c.stock<25).sort((a,b)=>a.stock-b.stock).slice(0,5);

    const dailySummary = useMemo(() => {
      const map = {};
      receipts.forEach(r => {
        const d = new Date(r.date);
        const ts = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        if (!map[ts]) map[ts] = { ts, cash:0, transfer:0, card:0, total:0, bills:0 };
        const p = r.payment || 'เงินสด';
        if (p==='เงินสด') map[ts].cash += r.total;
        else if (p==='โอน') map[ts].transfer += r.total;
        else map[ts].card += r.total;
        map[ts].total += r.total;
        map[ts].bills++;
      });
      return Object.values(map).sort((a,b)=>b.ts-a.ts);
    }, [receipts]);

    return (
      <div className="content-narrow">
        {/* Stat row */}
        <div className="grid g-4" style={{ marginBottom:16 }}>
          <Stat icon="money" label="ยอดขายวันนี้" value={fmt.baht(metrics.today)} delta={`${metrics.todayBills} บิล`} deltaDir="up"/>
          <Stat icon="receipt" iconBg="var(--blue-bg)" iconFg="var(--blue)" label="ยอดขายเดือนนี้" value={fmt.baht(metrics.month)} delta={`${metrics.monthBills} บิล`} deltaDir="up"/>
          <Stat icon="wallet" iconBg="var(--green-bg)" iconFg="var(--green)" label="เฉลี่ยต่อบิล" value={fmt.baht(Math.round(metrics.avg))}/>
          <Stat icon="box" iconBg="#EDEAF6" iconFg="#6A55A8" label="ชิ้นที่ขายได้" value={fmt.num(metrics.totalUnits)} unit="ชิ้น"/>
        </div>

        <div className="grid" style={{ gridTemplateColumns:'1.6fr 1fr', alignItems:'stretch' }}>
          {/* Chart */}
          <div className="card card-pad">
            <div className="sec-head" style={{ marginBottom:8 }}>
              <h2>ยอดขาย 7 วันล่าสุด</h2>
              <div className="sec-spacer"></div>
              <span className="chip chip-gold"><Icon name="trendUp" size={14}/> รวม {fmt.baht(metrics.days.reduce((s,d)=>s+d.sum,0))}</span>
            </div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:'min(3.5%,18px)', height:200, padding:'18px 4px 0' }}>
              {metrics.days.map((d,i) => {
                const h = Math.max(6, (d.sum/maxDay)*160);
                const isToday = i===metrics.days.length-1;
                return (
                  <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                    <div className="num" style={{ fontSize:11, fontWeight:700, color: d.sum?'var(--tx-2)':'var(--tx-3)' }}>{d.sum?fmt.num(d.sum):''}</div>
                    <div style={{ width:'100%', maxWidth:42, height:h, borderRadius:'8px 8px 4px 4px',
                      background: isToday?'linear-gradient(180deg,var(--gold),var(--gold-deep))':'linear-gradient(180deg,#EAE3D2,#D8CFBA)',
                      boxShadow: isToday?'var(--sh-gold)':'none', transition:'height .5s cubic-bezier(.2,.8,.2,1)' }}></div>
                    <div style={{ fontSize:12, fontWeight:600, color: isToday?'var(--gold-deep)':'var(--tx-3)' }}>{d.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Top products */}
          <div className="card card-pad">
            <div className="sec-head" style={{ marginBottom:14 }}>
              <h2>สินค้าขายดี</h2>
              <div className="sec-spacer"></div>
              <span className="tag">เดือนนี้</span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {metrics.top.map((p,i) => (
                <div key={p.id} className="row gap-12">
                  <div style={{ width:22, fontWeight:800, color: i===0?'var(--gold-deep)':'var(--tx-3)', fontSize:15 }} className="num">{i+1}</div>
                  <ProductThumb product={p} size={40}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13.5, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</div>
                    <div style={{ fontSize:12, color:'var(--tx-3)' }}>{p.code} · {p.size}</div>
                  </div>
                  <div className="num" style={{ fontWeight:700, fontSize:14 }}>{p.qty} <span style={{ fontSize:11, color:'var(--tx-3)', fontWeight:500 }}>ชิ้น</span></div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Daily payment breakdown */}
        {dailySummary.length > 0 && (
          <div className="card" style={{ marginTop:16, overflow:'hidden' }}>
            <div className="sec-head card-pad" style={{ marginBottom:0, paddingBottom:12 }}>
              <div style={{ width:38,height:38,borderRadius:10,background:'var(--gold-wash)',color:'var(--gold-deep)',display:'grid',placeItems:'center' }}>
                <Icon name="calendar" size={20}/>
              </div>
              <div style={{ marginLeft:10 }}>
                <h2 style={{ margin:0 }}>ยอดขายสะสมรายวัน</h2>
                <div className="sub" style={{ fontSize:12 }}>แยกตามประเภทการชำระเงิน</div>
              </div>
            </div>
            <div style={{ overflowX:'auto' }}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>วันที่</th>
                    <th className="r" style={{ color:'var(--green)' }}>เงินสด</th>
                    <th className="r" style={{ color:'var(--blue)' }}>โอน</th>
                    <th className="r" style={{ color:'#6A55A8' }}>บัตร</th>
                    <th className="r">รวม</th>
                    <th className="r hide-mobile">จำนวนบิล</th>
                  </tr>
                </thead>
                <tbody>
                  {dailySummary.map(d => (
                    <tr key={d.ts}>
                      <td style={{ fontWeight:600 }}>
                        {new Date(d.ts).toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' })}
                      </td>
                      <td className="r num" style={{ color: d.cash>0?'var(--green)':'var(--tx-3)' }}>
                        {d.cash>0 ? fmt.baht(d.cash) : '—'}
                      </td>
                      <td className="r num" style={{ color: d.transfer>0?'var(--blue)':'var(--tx-3)' }}>
                        {d.transfer>0 ? fmt.baht(d.transfer) : '—'}
                      </td>
                      <td className="r num" style={{ color: d.card>0?'#6A55A8':'var(--tx-3)' }}>
                        {d.card>0 ? fmt.baht(d.card) : '—'}
                      </td>
                      <td className="r num" style={{ fontWeight:700, fontSize:14 }}>{fmt.baht(d.total)}</td>
                      <td className="r hide-mobile"><span className="chip chip-gold">{d.bills} บิล</span></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{ borderTop:'2px solid var(--line)' }}>
                    <td style={{ fontWeight:700 }}>รวมทั้งหมด</td>
                    <td className="r num" style={{ fontWeight:700, color:'var(--green)' }}>{fmt.baht(dailySummary.reduce((s,d)=>s+d.cash,0))}</td>
                    <td className="r num" style={{ fontWeight:700, color:'var(--blue)' }}>{fmt.baht(dailySummary.reduce((s,d)=>s+d.transfer,0))}</td>
                    <td className="r num" style={{ fontWeight:700, color:'#6A55A8' }}>{fmt.baht(dailySummary.reduce((s,d)=>s+d.card,0))}</td>
                    <td className="r num" style={{ fontWeight:800, fontSize:15 }}>{fmt.baht(dailySummary.reduce((s,d)=>s+d.total,0))}</td>
                    <td className="r hide-mobile"><span className="chip chip-gold">{dailySummary.reduce((s,d)=>s+d.bills,0)} บิล</span></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}

        {/* Recent + low stock */}
        <div className="grid g-2 collapse-1" style={{ marginTop:16 }}>
          <div className="card">
